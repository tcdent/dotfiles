##### basics #####
set -g mouse on
bind -n MouseDrag1Border resize-pane -M
set -g focus-events on
set -g base-index 1
set -g pane-base-index 1

##### mouse scroll targets pane under cursor #####
# If alternate screen (nvim, etc), send scroll to app; otherwise enter copy-mode
bind -n WheelUpPane select-pane -t= \; if-shell -F "#{alternate_on}" "send-keys -M" "copy-mode -e; send-keys -M"
bind -n WheelDownPane select-pane -t= \; send-keys -M

##### window title (shown in Ghostty tab/window) #####
set -g set-titles on
set -g set-titles-string "#S"

##### colors #####
set -g pane-active-border-style "fg=magenta"

##### status bar #####
set -g status off

##### auto-name sessions based on directory #####
set-hook -g session-created 'run-shell "tmux rename-session \"$(basename \"#{pane_current_path}\")\""'

##### pane resize with prefix + arrow keys #####
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

##### pane selection with Alt keys #####
bind -n M-1 select-pane -t 1
bind -n M-2 select-pane -t 2
bind -n M-3 select-pane -t 3
bind -n M-4 select-pane -t 4
bind -n M-5 select-pane -t 5
bind -n M-6 select-pane -t 6
bind -n M-7 select-pane -t 7
bind -n M-8 select-pane -t 8
bind -n M-9 select-pane -t 9

##### dev workspace #####
# prefix + w → new window with the layout

# split 80% horizontal
# [1|2]
# select 1
# split 1 vertical
# split 2 vertical
# split 3 vertical
#[1,2,3,4|5]
# select 5
# split 5 horizontal
# select 5
# split 5 vertical
# [1,2,3,4|5,6|7]
# select 7
# split horizontal
# select 7
# split vertical
# [1,2,3,4|5,6|7,8|9]
# select 9
# run tmux
bind w new-window -n dev \; \
  split-window -h -p 80 \; \
  select-pane -t 1 \; \
  split-window -v \; \
  split-window -v \; \
  split-window -v \; \
  select-pane -t 5 \; \
  split-window -h \; \
  select-pane -t 5 \; \
  split-window -h \; \
  select-pane -t 5 \; \
  split-window -v \; \
  select-pane -t 7 \; \
  split-window -v \; \
  select-pane -t 9 \; \
  send-keys 'nvim --listen /tmp/nvim-$(tmux display -p "#S").sock .' C-m \; \
  select-pane -t 1

##### stats workspace: btop/lazypod top, irssi/shell/logs bottom #####
# prefix + e → system stats layout
bind e new-window -n stats \; \
  split-window -h -p 50 \; \
  select-pane -t 1 \; \
  split-window -v -p 50 \; \
  select-pane -t 3 \; \
  split-window -v -p 50 \; \
  select-pane -t 4 \; \
  split-window -h -p 50 \; \
  select-pane -t 1 \; \
  send-keys 'btop' C-m \; \
  select-pane -t 2 \; \
  send-keys 'lazypodman' C-m \; \
  select-pane -t 3 \; \
  send-keys 'irssi --home=~/.config/irssi' C-m \; \
  select-pane -t 5 \; \
  send-keys 'grc tail -f /var/log/*.log' C-m \; \
  select-pane -t 4

##### metrics workspace: btop top, ip/dmesg bottom #####
# prefix + m → wired display metrics layout
bind m new-window -n metrics \; \
  split-window -v -p 30 \; \
  split-window -h -p 55 \; \
  select-pane -t 1 \; \
  send-keys 'btop -t' C-m \; \
  select-pane -t 2 \; \
  send-keys 'watch --color \"ip -c address | grep inet\"' C-m \; \
  select-pane -t 3 \; \
  send-keys 'sudo dmesg -w' C-m \; \
  select-pane -t 1

##### show pane titles in border #####
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_title} "

##### env propagation into claude panes from ~/.env #####
# tmux-env-inject sources ~/.env, sets the named var in tmux's global env,
# and appends it (idempotently) to update-environment so new panes inherit.
# Add one run-shell per var that agents need at launch.
run-shell 'tmux-env-inject TWO_HOOK_PSK'
